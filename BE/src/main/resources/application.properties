# ============================================================
# Mono Wear API - Application Configuration
# ============================================================
# --- Application ---
quarkus.application.name=monowear-api
quarkus.application.version=1.0.0
# --- HTTP ---
quarkus.http.port=8080
# CORS handled by com.monowear.config.CorsFilter
# --- Datasource (MySQL 8.x) ---
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:root}
quarkus.datasource.password=${DB_PASSWORD:123456}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mysql://localhost:3306/monowear_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20
# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.repair-at-start=true
# --- SmallRye JWT ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://monowear.io
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=https://monowear.io
# --- Jackson ---
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.write-dates-as-timestamps=false
# --- Logging ---
quarkus.log.console.enable=true
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."com.monowear".level=DEBUG
quarkus.log.category."org.hibernate.SQL".level=DEBUG
quarkus.log.category."org.hibernate.type.descriptor.sql".level=TRACE
quarkus.log.file.enable=true
quarkus.log.file.path=quarkus.log
quarkus.log.file.level=DEBUG
